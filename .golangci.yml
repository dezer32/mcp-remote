version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    errcheck:
      exclude-functions:
        - (*net/http.Response).Body.Close
        - (io.ReadCloser).Close
        - (io.Closer).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt

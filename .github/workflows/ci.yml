name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        if: runner.os != 'Windows'
        run: bash -c 'test -z "$(gofmt -l .)" || (echo "::error::gofmt issues:"; gofmt -l .; exit 1)'

      - name: golangci-lint
        if: runner.os == 'Linux'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: go test
        run: go test -race -count=1 ./...

  integration:
    name: integration
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(fromJSON('["refs/heads/master","refs/heads/main"]'), github.ref)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download modules
        run: go mod download

      - name: go test (integration)
        run: go test -tags=integration -race -v ./test/...
